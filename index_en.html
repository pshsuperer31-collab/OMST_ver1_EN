<!DOCTYPE html>
<html lang="en">
<head>

    <!-- personality_analyzer.js: 파일 없음, 기능 비활성 -->
    <style>
    :root { 
        --navy: #002D62; 
        --bg-light: #ffffff; 
        --text-dark: #2c3e50; 
        /* 시스템 기본 폰트 설정 (따로 저장 안 해도 나오는 폰트) */
        --font-main: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --font-serif: "AppleMyungjo", "Apple Myungjo", "NanumMyeongjo", "Nanum Myeongjo", "Batang", "serif";
    }

    /* 1. 화면 전체를 중앙으로 정렬하는 바디 설정 */
body {
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: center; /* 세로 중앙 */
    align-items: center;     /* 가로 중앙 */
    min-height: 100vh;      /* 화면 높이 100% 사용 */
    background-color: #f8f9fa;
}

 /* 2. 퀴즈 박스 (크기 키우고 중앙 배치) */
.container {
    width: 95%;             /* 모바일 대응 */
    max-width: 700px;       /* [수정] 600px에서 700px로 크기 확장 */
    margin: 40px auto;      /* 상하 여백 부여 */
    background: #fff;
    padding: 40px;          /* 내부 여백도 더 시원하게 */
    border-radius: 30px;    /* 모서리를 더 부드럽게 */
    box-shadow: 0 20px 50px rgba(0,0,0,0.1); /* 그림자를 더 깊게 해서 입체감 부여 */
    text-align: center;
    
    /* 혹시 모를 잘림 방지 */
    box-sizing: border-box; 
    display: block;         /* important 제거됨 */
}

/* 3. 시작 페이지도 중앙 정렬 유지 */
#start-page {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 100%;
}

    /* 2. 헤더 내부의 위쪽 여백 줄이기 (50px -> 10px) */
#quiz-ui .header {
    padding-top: 10px !important; /* 로고 바로 위 여백 */
    margin-bottom: 30px; 
    text-align: center;
}

/* 3. 결과 영역의 헤더도 동일하게 적용 */
#result-area .header {
    padding-top: 10px !important;
    min-height: 0; /* 불필요한 높이 제거 */
}

    /* [수정] 로고 영역 스타일 */
    .header {
        width: 100%;
        padding: 40px 0 20px 0;
        text-align: center;
        background: #fff;
    }
    
  /* ANALYSIS REPORT 글자 완전 제거 */
    .header h1, .header p { 
        display: none !important; 
    }

.header p { 
    display: none; /* 서브 타이틀 강제 숨김 */

    /* [추가] 로고 이미지 스타일: 중앙에 땋! 위치하고 크기 조절 */
logo-area img {
        width: 100%;
        max-width: 420px;
        height: auto;
        display: block;
        margin: 0 auto;
    }
}

    .logo-img { width: 120px; height: auto; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
    .logo-img:hover { transform: scale(1.05); }

    /* [Mobile Optimization] */

    /* 모바일 전용 로고 크기 조정 */
@media (max-width: 600px) {
    .header { padding: 40px 0 20px 0; }
    .logo-area img { max-width: 280px; } /* 모바일에서는 화면에 맞게 */
}

        .res-symbol { font-size: 4.8rem !important; } /* 괘 이미지 대폭 확대 */
        .res-hex-title { font-size: 2.4rem !important; }
        .res-binary { font-size: 0.9rem !important; }
        
        /* 8단계 프로필 및 상세 카드 그리드 강제 2열 */
        .mobile-grid-2 { 
            display: grid !important; 
            grid-template-columns: 1fr 1fr !important; 
            gap: 10px !important; 
        }
        .compact-card { padding: 15px !important; }
        .compact-font { font-size: 0.82rem !important; line-height: 1.5 !important; }
        .compact-title { font-size: 0.8rem !important; margin-bottom: 4px !important; }
    }

    /* [나침반 바늘 & 프로그레스 바] 바늘 움직임 텐션 추가 */
    .progress-wrapper { 
        position: relative; 
        width: 100%; 
        margin: 60px 0 40px 0;
    }
    .progress-container { 
        width: 100%; 
        height: 12px; 
        background: #eee; 
        border-radius: 10px; 
        overflow: hidden; 
    }
   /* [수정 후 - 하늘색 처방] */
.progress-fill {
    height: 100%;
    /* 🎨 원장님이 원하시는 화사한 스카이 블루 */
    background-color: #3498DB; 
    
    /* [디테일] 입체감을 살짝 주는 그라데이션 (옵션) */
    background-image: linear-gradient(90deg, #3498DB 0%, #5DADE2 100%);
    
    width: 0%;
    border-radius: 10px; /* 모서리도 둥글게 */
    
    /* 쫀득하고 부드러운 움직임을 주는 텐션 값 */
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    
    box-shadow: 0 2px 5px rgba(52, 152, 219, 0.3); /* 은은한 파란 그림자 */
}
    
    .arrow-indicator {
        position: absolute;
        top: -45px;
        left: 0%; /* JS가 이 값을 0% -> 100%로 바꿀 겁니다 */
        transform: translateX(-50%);
        font-size: 32px;
        /* 나침반 바늘처럼 쫀득한 움직임을 주는 텐션 값 */
        transition: left 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); 
        animation: bounce 1.8s infinite;
        z-index: 10;
    }

    @keyframes bounce {
        0%, 100% { transform: translate(-50%, 0); }
        50% { transform: translate(-50%, -10px); }
    }

    /* 2. 질문 영역: 긴 글도 예쁘게 담는 그릇 */
    .q-text { 
        font-family: var(--font-apple-serif); 
        font-size: 1.8rem; 
        font-weight: 600; 
        color: #1a1a1a; 
        line-height: 1.7; /* 행간을 아주 미세하게 줄여 긴 문장의 이질감 해소 */
        letter-spacing: -0.3px; 
        word-break: keep-all; 
        /* 고정 높이 대신 최소 높이만 설정하고 나머지는 유연하게 */
        min-height: 180px; 
        height: auto; 
        padding: 20px 30px 40px 30px; /* 아래쪽 여백을 더 줘서 옵션과 분리 */
        margin-bottom: 45px;
        display: flex; 
        align-items: center; 
        justify-content: center; 
        -webkit-font-smoothing: antialiased;
    }

    /* 질문 텍스트 정렬 */
#question-text {
    text-align: center;
    word-break: break-word; /* 모바일에서 깨짐 방지용 기본 설정 전환 */
    line-height: 1.6;
    margin-bottom: 30px;
}

/* 버튼들을 감싸는 영역을 중앙 정렬 */
#options-container {
    display: flex;
    flex-direction: column; /* 세로로 배치 */
    align-items: center;    /* 가운데 정렬 */

    width: 100%;
}

/* 버튼 자체의 스타일 수정 */
.option-btn {
    width: 100%;

}

.option-btn:hover, .option-btn:active {

    box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
}

/* 성별 선택 토글 버튼 */
.gender-group {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
    margin-bottom: 30px;
}

.gender-btn {
    flex: 1;
    max-width: 120px;
    padding: 15px;
    border: 2px solid #eee;
    border-radius: 15px;
    background: #fff;
    color: #888;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
}

.gender-btn.active {
    border-color: #002D62;
    background: #002D62;
    color: #fff;
    box-shadow: 0 5px 15px rgba(0, 45, 98, 0.2);
}

.gender-btn:hover:not(.active) {
    background: #f0f4f8;
    border-color: #3498DB;
    color: #3498DB;
}

    /* 3. 옵션 버튼 사이의 간격 조정 */
    .options { 
        display: grid; 
        gap: 10px; 
        max-width: 550px; 
        margin: 0 auto 30px auto; /* 하단 이전버튼과 간격 확보 */
    }
    .opt-btn { padding: 18px; border: 1.5px solid #eee; border-radius: 15px; cursor: pointer; transition: 0.2s; font-size: 1.15rem; background: #fff; font-weight: 600; }
    .opt-btn:hover { border-color: #3498DB; background: #f0f4f8; color: #3498DB; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(52,152,219,0.1); }

    /* 결과 페이지 디자인 */
    #result-area {
    display: none; /* 기본은 숨김 */
    width: 100%;
    height: auto !important; /* 높이 제한 해제 */
    min-height: 100vh;
    overflow-y: visible !important; /* 내용이 넘치면 무조건 보여줌 */
    padding-bottom: 50px; /* 맨 밑 버튼이 바닥에 붙지 않게 여백 */
}
/* 리포트 몸통 */
#report-body {
        display: flex;
        flex-direction: column; /* 위에서 아래로 */
        align-items: center;
    }

    #report-body > div {
        width: 100%; /* 각 섹션이 가로를 꽉 채우며 순서대로 배치됨 */
    }
    .result-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; align-items: center; margin-bottom: 30px; }

    /* 1. 수식어(질서를 바로잡는...) 크기 키우기 */
    .result-subtitle { 
        font-family: var(--font-serif); 
        font-size: 1.75rem; /* 아주 조금 더 키웠습니다 */
        font-weight: 700; 
        color: var(--navy); 
        text-align: center; 
        display: block; 
        margin-bottom: 10px;
    }

    .iching-symbol { font-size: 9rem; color: var(--navy); text-align: center; }
    .hex-full-name { font-size: 2.8rem; font-weight: 900; text-align: center; }
    .report-section { background: #fafafa; padding: 25px; border-radius: 18px; border: 1px solid #f0f0f0; margin-bottom: 20px; }
    .section-title { font-weight: 800; color: var(--navy); font-size: 1.2rem; margin-bottom: 12px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
    
    .highlight-box { background: var(--navy); color: #fff; padding: 25px; border-radius: 18px; margin-bottom: 25px; text-align: center; }
    .highlight-box h3 { color: #ffd700; margin: 0 0 10px 0; }

    /* 모바일 최적화 (화면 너비 768px 이하일 때 자동 실행) */
@media screen and (max-width: 768px) {
    /* 0. 차트 및 괘 그림 모바일에서 세로로 배치 (찌그러짐 방지) */
    .result-grid {
        grid-template-columns: 1fr !important;
        gap: 20px !important;
    }

    /* 오행 상생상극 카드 - 모바일 1열 */
    .wuxing-relation-grid {
        grid-template-columns: 1fr !important;
    }

    /* 1. 전체 컨테이너 여백 조정 */
    body, .container { 
        padding: 15px !important; 
    }

    /* 2. 모든 섹션의 패딩과 마진 축소 (답답함 해소) */
    .report-section {

    /* 3. 제목(섹션 타이틀) 크기 최적화 */
    .section-title {

        margin-bottom: 20px !important; 
        }

    /* 4. 본문 글자 크기 (전체적으로 살짝 슬림하게) */
    .detail-item, .zen-content, .advice-content, p {

    /* 4-1. 특대형 텍스트 및 로고 최적화 (모바일용 강제 축소) */
    .header h1 {
        font-size: 2.2rem !important;
    }
    .iching-symbol {
        font-size: 5.5rem !important;
    }
    .hex-full-name {
        font-size: 1.8rem !important;
    }
    .q-text {
        font-size: 1.25rem !important;

    /* 통합 시너지 카드 모바일 폭 최적화 */
    .potential-synergy-card {

    .synergy-text {

    .match-grid { 
        display: block !important; 
    }
    .match-card { 
        margin-bottom: 15px !important; 
        width: 100% !important; 
    }

    /* 6. 질문지(Input/Button) 모바일 대응 */
    input, select, button {
        font-size: 1rem !important;
        padding: 12px !important;

    }

    /* 1. 차트(캔버스)가 화면 밖으로 나가지 않게 강제 조정 */
    canvas {

    }

    .chart-outer-wrap {

    max-width: 480px;

    @media (max-width: 600px) {

    }
}
    /* 64괘 에너지 휠 전용 스타일 */
    .wheel-wrapper {
        position: relative;
        width: 300px;
        height: 300px;
        margin: 40px auto;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #E74C3C; 
        box-shadow: 0 15px 40px rgba(0,0,0,0.08);

    }

    .wheel-pieces {
        position: absolute;

        z-index: 1;
    }

    .piece {

function displayResult(upperName, lowerName) {
    const upperBinary = trigramInfo[upperName];
    const lowerBinary = trigramInfo[lowerName];
    
    if (!upperBinary || !lowerBinary) return;

    const fullKey = upperBinary + lowerBinary;
    const data = ichingDB[fullKey];

    if (data) {
        // HTML 요소의 ID와 데이터 매칭 (HTML에 이 ID들이 있어야 합니다!)
        document.getElementById('resultName').innerHTML = `${data.symbol} ${data.name}`;
        document.getElementById('resultSummary').innerText = data.summary;
        document.getElementById('resultOneLine').innerText = data.oneLine;
        
        // 상세 내용
        document.getElementById('socialContent').innerText = data.socialAction;
        document.getElementById('innerContent').innerText = data.innerMotive;
        document.getElementById('adviceText').innerText = data.advice;

        // 결과창 보여주기
        document.getElementById('resultContainer').classList.remove('hidden');
    }
}

/**
 * [내부 엔진] 괘의 순서에 상관없이 DB에서 데이터를 집요하게 찾아냅니다.
 * 원장님 DB가 '곤+감+리'여도 ['리', '감', '곤'] 배열을 넣으면 찾아냄.
 */
function getAtomicData(keys, dbSource) {
    if (!keys || keys.length === 0 || !dbSource) return null;
    
    // 1. 현재 입력된 괘를 집합(Set)으로 변환 (순서 무시)
    const targetSet = new Set(keys.map(k => k.trim()));
    
    // 2. 전달된 dbSource의 모든 키를 전수조사
    const allKeys = Object.keys(dbSource || {});
    
    // 3. 조건에 맞는 후보군 찾기 (3개 매칭, 2개 매칭, 1개 매칭)
    const candidates = [];
    for (const key of allKeys) {
        let dbKeys = key.split('+').map(k => k.trim());
        
        // [추가] db9.js처럼 '+'가 없는 3글자 키(예: "건리손") 대응
        if (dbKeys.length === 1 && key.length === 3) {
            dbKeys = key.split(''); 
        }
        
        // DB의 키가 구성한 모든 괘가 타겟 배열(targetSet) 안에 포함되어야 함
        if (dbKeys.every(k => targetSet.has(k))) {
            candidates.push({
                key: key,
                matchCount: dbKeys.length // 몇 개가 일치했는지 점수 부여
            });
        }
    }
    
    if (candidates.length === 0) return null; // 1개조차도 포함된 게 없으면 실패
    
    // 4. 가장 매칭 수가 많은(길이가 긴) 데이터부터 우선순위 부여 (내림차순 정렬)
    candidates.sort((a, b) => b.matchCount - a.matchCount);
    
    // 최고 점수(Best Match)의 데이터 키를 선택
    const bestMatchKey = candidates[0].key;
    console.log(`[Smart Fallback Match] 대상 조합(${keys.join('+')}) -> 매칭 성공: [${bestMatchKey}] (일치수: ${candidates[0].matchCount})`);
    
    return dbSource[bestMatchKey];
}

function getAllHexagrams() {
    return Object.values(window.ichingDB).map(item => item.name.split(' (')[0].replace(/^\d+\.\s*/, ''));
}

function calculate64Score(myName, targetName) {
    if (myName === targetName) return 100;
    const db = window.ichingDB;
    const myKey = Object.keys(db).find(key => db[key].name.includes(myName));
    const targetKey = Object.keys(db).find(key => db[key].name.includes(targetName));
    if (!myKey || !targetKey) return 50;
    let diff = 0;
    for(let i=0; i<6; i++) { if(myKey[i] !== targetKey[i]) diff++; }
    return 100 - (diff * 10); 
}

function getGradientColor(score) {
    let visualScore = (score - 40) * (100 / 60); 
    if (visualScore < 0) visualScore = 0;
    if (visualScore > 100) visualScore = 100;

    if (visualScore >= 80) return '#3498DB'; // 파랑
    if (visualScore >= 60) return '#2ECC71'; // 초록
    if (visualScore >= 40) return '#F1C40F'; // 노랑
    if (visualScore >= 20) return '#E67E22'; // 주황
    return '#E74C3C';                       // 빨강
}

function showWheelInfo(guaName, score) {
    const infoBox = document.getElementById('wheel-info');
    const db = window.ichingDB;
    if (!db || !infoBox) return;

    let targetGua = null;
    let targetNickname = "기질 분석 중...";

    Object.keys(db).forEach(key => {
        // 이름에 포함되어 있는지 확인 (숫자 제거된 순수 이름 기준)
        const pureDbName = db[key].name.split(' (')[0].replace(/^\d+\.\s*/, '');

            targetGua = db[key]; 
        }

    Object.keys(window.ICHING_NICKNAMES).forEach(nkey => {
        if (guaName.includes(nkey)) {
            targetNickname = window.ICHING_NICKNAMES[nkey];
        }
    });

    let vScore = (score - 40) * (100 / 60);
    if (vScore < 0) vScore = 0;

    else if (vScore >= 40) { status = "⚖️ Neutral Rapport"; statusColor = "#F1C40F"; }
    else if (vScore >= 20) { status = "⚠️ Strained Rapport"; statusColor = "#E67E22"; }

function render64Wheel(userHexaName) {
    const container = document.getElementById('wheel-pieces');
    if (!container) return;

    const allHexas = getAllHexagrams(); 
    const angleStep = 360 / 64;

    let scoredList = allHexas.map(target => ({
        name: target,
        score: calculate64Score(userHexaName, target)
    }));

    scoredList.sort((a, b) => b.score - a.score);

    let html = '';
    scoredList.forEach((item, i) => {
        const color = getGradientColor(item.score);
        const rotation = i * angleStep;
        html += `
            <div class="piece" 
                 style="transform: rotate(${rotation}deg); background: ${color};"
                 onmouseover="showWheelInfo('${item.name}', ${item.score})">
            </div>`;
    });
    
    container.innerHTML = html;
    
    // 센터 정보 업데이트 (심볼 + 이름)
    const wheelCenterName = document.getElementById('wheel-my-name');
    const wheelCenterSymbol = document.getElementById('wheel-my-symbol');
    
    if (wheelCenterName && wheelCenterSymbol) {
        const db = window.ichingDB;
        let symbol = "-";
        Object.keys(db).forEach(key => {
            if (db[key].name.includes(userHexaName)) {
                symbol = db[key].symbol;
            }
        });
        
        wheelCenterSymbol.innerText = symbol;
        wheelCenterName.innerText = userHexaName;
    }
}

      me:'Receptivity & Stability 土',
      summary:'The energy of embracing, receiving, and holding center',
      helped:'<strong>Expression & Passion 火</strong> invigorates you, building firmer foundations',
      helps:'<strong>Decision & Principle 金</strong> is given weight by you, strengthening resolve',
      drained:'<strong>Growth & Push 木</strong> may destabilize your balance if unchecked',
      drains:'<strong>Contemplation & Depth 水</strong> can be blocked by you, interrupting flow'
    },
    '金':{
      me:'Decision & Principle 金',
      summary:'The energy of setting standards and making judgments',
      helped:'<strong>Receptivity & Stability 土</strong> supports you, giving gravity to decisions',
      helps:'<strong>Contemplation & Depth 水</strong> is clarified by you, deepening reflection',
      drained:'<strong>Expression & Passion 火</strong> may shake your principles if intense',
      drains:'<strong>Growth & Push 木</strong> can be suppressed by you, stifling expansion'

      summary:'The energy of thinking deeply and holding within',
      helped:'<strong>Decision & Principle 金</strong> gives you direction, clarifying contemplation',
      helps:'<strong>Growth & Push 木</strong> is inspired by you, fostering new growth',
      drained:'<strong>Receptivity & Stability 土</strong> may obstruct your flow if too heavy',

  // 전역 public 함수 (window 네임스페이스 사용)
  window.renderWuxingSection = function(outerPcts, innerPcts, displayName){
    try {
      const wu = toWuxingDist(outerPcts, innerPcts);
      const sorted = WU_LIST.map(e=>({e,pct:(wu[e]||0)})).sort((a,b)=>b.pct-a.pct);
      const top1 = sorted[0], top2 = sorted[1];
      const phrase = wuPhrase(wu);
      const trait = EL_TRAITS[top1.e];
      const topEl = WU_CHAR[top1.e];
      const name = displayName || 'Your';

      let html = '';
      html += '<div class="report-section" style="margin-top: 50px; padding: 0; background: transparent; border: none;">';
      html += '<div style="text-align: center; margin-bottom: 30px;">';
      html += '<div style="font-size: 0.8rem; color: #b8860b; letter-spacing: 4px; font-weight: 800; margin-bottom: 10px; opacity: 0.8;">FIVE ELEMENTS Analysis · 五行</div>';
      html += '<h3 style="font-size: 1.8rem; color: #1a1a1a; margin: 0; font-family: \'Georgia\', serif; font-weight: 800;">' + name + "'s Energy Signature</h3>";

      html += '</div>';

      // Easy explanation box
      html += '<div style="font-family: \'Georgia\', serif; font-size: 0.95rem; color: #444; line-height: 1.9; background: #fdfaf3; padding: 22px 26px; border-radius: 12px; border-left: 4px solid #d4af37; margin-bottom: 28px; word-break: keep-all;">';

      html += '<span style="color:#6B8E5A;font-weight:700;">Growth & Push 木</span>, ';
      html += '<span style="color:#A63D40;font-weight:700;">Expression & Passion 火</span>, ';
      html += '<span style="color:#B8924A;font-weight:700;">Receptivity & Stability 土</span>, ';
      html += '<span style="color:#8B7355;font-weight:700;">Decision & Principle 金</span>, ';
      html += '<span style="color:#4A90E2;font-weight:700;">Contemplation & Depth 水</span>.<br><br>';
      html += 'Just as Outer (上卦) and Inner (下卦) meet to form a complete hexagram, <strong>your test data reveals the merged energy pattern</strong><br>in the chart below.';
      html += '</div>';

      html += '<div style="background: #fff; border: 1px solid #eee; border-radius: 18px; padding: 30px 24px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">';
      html += '<div style="text-align:center;font-family:\'Georgia\', serif;font-weight:800;color:#002D62;font-size:1.15rem;margin-bottom:4px;">' + name + "'s Five-Element Distribution</div>";
      html += '<div style="text-align:center;font-size:0.8rem;color:#999;margin-bottom:10px;">(Combined ratio of Outer + Inner trigrams)</div>';
      html += pentagonSVG(wu, '#002D62');
      html += '<div style="margin-top:20px;padding:14px 18px;background:rgba(212,175,55,0.07);border-radius:10px;font-family:\'Georgia\', serif;font-size:0.95rem;color:#333;line-height:1.7;text-align:center;word-break:keep-all;">' + phrase.text + '</div>';
      html += '</div>';

      html += '<div style="background: #fff; border: 1px solid #eee; border-radius: 18px; padding: 28px 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">';
      html += '<div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px dashed #eee;">';
      html += '<div style="flex-shrink:0;width:64px;height:64px;border-radius:50%;background:' + topEl.color + '15;border:3px solid ' + topEl.color + ';display:flex;align-items:center;justify-content:center;font-family:serif;font-size:1.8rem;font-weight:bold;color:' + topEl.color + ';">' + top1.e + '</div>';
      html += '<div style="flex:1;">';
      html += '<div style="font-family:\'Georgia\', serif;font-weight:800;color:' + topEl.color + ';font-size:1.1rem;margin-bottom:3px;">Your Primary Axis: ' + trait.me + '</div>';
      html += '<div style="font-size:0.88rem;color:#666;line-height:1.6;word-break:keep-all;">' + trait.summary + ' — flowing strongest at <strong>' + top1.pct.toFixed(0) + '%</strong> of your total energy.</div>';
      html += '</div>';
      html += '</div>';

      html += '<div style="font-family:\'Georgia\', serif;font-weight:700;color:#333;font-size:0.95rem;margin-bottom:14px;letter-spacing:-0.01em;">💫 The Elemental Dynamics Around Your Core</div>';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;" class="wuxing-relation-grid">';

      // 4 cards
      const cards = [
        { ico:'🌿', tag:'SUPPORTING · What nourishes you', col:'#6B8E5A', bg:'rgba(107,142,90,0.05)', bd:'rgba(107,142,90,0.2)', body:trait.helped },
        { ico:'🌊', tag:'NURTURING · What you nourish', col:'#4A90E2', bg:'rgba(74,144,226,0.05)', bd:'rgba(74,144,226,0.2)', body:trait.helps },
        { ico:'⚠️', tag:'RESTRAINING · What restrains you', col:'#B8924A', bg:'rgba(184,146,74,0.05)', bd:'rgba(184,146,74,0.25)', body:trait.drained },
        { ico:'⚡', tag:'CONTROLLING · What you restrain', col:'#A63D40', bg:'rgba(166,61,64,0.05)', bd:'rgba(166,61,64,0.2)', body:trait.drains }
      ];
      cards.forEach(c => {
        html += '<div style="background:' + c.bg + ';border:1px solid ' + c.bd + ';border-radius:10px;padding:14px 16px;">';
        html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">';
        html += '<span style="font-size:1.1rem;">' + c.ico + '</span>';
        html += '<span style="font-family:\'Georgia\', serif;font-size:0.78rem;letter-spacing:2px;color:' + c.col + ';font-weight:700;">' + c.tag + '</span>';
        html += '</div>';
        html += '<div style="font-size:0.85rem;color:#333;line-height:1.65;word-break:keep-all;">' + c.body + '</div>';
        html += '</div>';
      });

      html += '</div>';

      // Dual axis case: secondary element note
      if(phrase.type === 'dual-axis'){
        html += '<div style="margin-top:18px;padding:14px 18px;background:#fafafa;border-radius:10px;border-left:3px solid ' + WU_CHAR[top2.e].color + ';">';
        html += '<div style="font-family:\'Georgia\', serif;font-size:0.85rem;color:#555;line-height:1.7;word-break:keep-all;">';
        html += '<strong style="color:' + WU_CHAR[top2.e].color + ';">' + WU_CHAR[top2.e].trait + ' (' + top2.pct.toFixed(0) + '%)</strong> also flows strongly alongside the primary axis. These two currents complement each other, giving you a dual-dimensional quality that operates in harmony.';
        html += '</div>';
        html += '</div>';
      }

      html += '</div>';
      html += '</div>';

      return html;
    } catch(e) {
      console.warn('[Five Elements] Render failed:', e.message);
      return '';
    }
  };
})();
